name: Update Industry Data

on:
  # 每天北京时间 20:00 (UTC 12:00) 主更新
  schedule:
    - cron: '0 12 * * *'
    # 每小时重试 (UTC 13:00-23:00 = 北京时间 21:00-次日07:00)
    - cron: '0 13-23 * * *'
  
  # 支持手动触发
  workflow_dispatch:
    inputs:
      days:
        description: '更新最近几天的数据'
        required: false
        default: '2'
      force:
        description: '强制更新（忽略已有数据检查）'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas numpy supabase
      
      - name: Check if update needed
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FORCE_UPDATE: ${{ github.event.inputs.force || 'false' }}
        run: |
          python3 server/scripts/check_update_needed.py
      
      - name: Run update script
        if: steps.check.outputs.needed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DAYS=${{ github.event.inputs.days || '2' }}
          echo "Updating last $DAYS days of data..."
          python3 server/auto_update_data.py $DAYS
      
      - name: Skip update
        if: steps.check.outputs.needed == 'false'
        run: |
          echo "Today's data already exists, skipping update."
      
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-log
          path: auto_update.log
          retention-days: 7
