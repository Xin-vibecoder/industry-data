# 同花顺行业数据自动更新定时任务
# 每天晚上19:00执行数据更新
0 19 * * * /workspace/projects/server/cron_update.sh

# 每天晚上20:00执行重试（如果19:00失败）
0 20 * * * /workspace/projects/server/cron_retry.sh

# 每天凌晨00:05清除成功标志
5 0 * * * rm -f /tmp/auto_update_success_*

# 每天凌晨00:10清理旧日志（保留最近7天）
10 0 * * * find /app/work/logs/bypass -name "auto_update.log" -size +10M -exec truncate -s 10M {} \;
